<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Zenith | Ultimate Student OS</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.3);
            --bg: #050505;
            --glass: rgba(15, 15, 20, 0.7);
            --glass-bright: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
            --text-dim: #888888;
            --radius: 24px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; cursor: default; }
        
        body {
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* --- MESH BACKGROUND --- */
        .mesh {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: 
                radial-gradient(circle at 10% 10%, #1a1a2e 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, #0f3460 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, #16213e 0%, transparent 100%);
        }

        /* --- SIDEBAR: NAVIGATION --- */
        aside {
            width: 280px;
            background: var(--glass);
            backdrop-filter: blur(40px);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 2.5rem;
            z-index: 10;
        }

        .brand { font-weight: 800; font-size: 1.5rem; letter-spacing: -1px; margin-bottom: 3rem; display: flex; align-items: center; gap: 12px; }
        .brand-icon { width: 12px; height: 12px; background: var(--accent); border-radius: 3px; transform: rotate(45deg); box-shadow: 0 0 15px var(--accent); }

        .nav-link {
            padding: 14px 18px; border-radius: 16px; margin-bottom: 8px; font-weight: 600; color: var(--text-dim);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; align-items: center; gap: 12px;
        }
        .nav-link:hover, .nav-link.active { background: var(--glass-bright); color: var(--text); }
        .nav-link.active { border-left: 3px solid var(--accent); }

        /* --- MAIN VIEWPORT --- */
        main { flex: 1; overflow-y: auto; position: relative; padding: 3rem; }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4rem; }
        .search-trigger {
            background: var(--glass-bright); border: 1px solid var(--border); padding: 12px 24px;
            border-radius: 50px; color: var(--text-dim); width: 350px; font-weight: 500; cursor: pointer;
        }

        /* --- THE ZENITH GRID --- */
        .zenith-grid { display: grid; grid-template-columns: repeat(6, 1fr); grid-auto-rows: minmax(180px, auto); gap: 1.5rem; }

        .widget {
            background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 2rem; position: relative; overflow: hidden;
            transition: 0.4s ease;
        }
        .widget:hover { border-color: var(--accent); transform: translateY(-5px); }

        /* Widget Variants */
        .w-large { grid-column: span 4; grid-row: span 2; }
        .w-medium { grid-column: span 2; grid-row: span 2; }
        .w-small { grid-column: span 2; }

        /* --- FOCUS TIMER --- */
        .timer-val { font-size: 4rem; font-weight: 800; letter-spacing: -2px; margin: 1rem 0; }
        
        /* --- TASK SYSTEM --- */
        .task-row {
            display: flex; align-items: center; gap: 12px; padding: 12px; background: var(--glass-bright);
            border-radius: 14px; margin-bottom: 8px; border: 1px solid transparent;
        }
        .task-row:hover { border-color: var(--border); }
        .dot { width: 10px; height: 10px; border-radius: 50%; border: 2px solid var(--accent); }

        /* --- OVERLAY: COMMAND PALETTE --- */
        #commander {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px);
            display: none; justify-content: center; align-items: flex-start; padding-top: 10vh; z-index: 1000;
        }
        .palette-card {
            width: 600px; background: #111; border: 1px solid var(--border); border-radius: 20px;
            padding: 2rem; box-shadow: 0 20px 80px rgba(0,0,0,1);
        }

        /* --- BUTTONS --- */
        .btn {
            background: var(--accent); color: #000; border: none; padding: 12px 24px; border-radius: 12px;
            font-weight: 800; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;
        }

        /* --- ANIMATIONS --- */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .widget { animation: fadeIn 0.8s ease backwards; }
        .widget:nth-child(2) { animation-delay: 0.1s; }
        .widget:nth-child(3) { animation-delay: 0.2s; }
    </style>
</head>
<body>

    <div class="mesh"></div>

    <aside>
        <div class="brand"><div class="brand-icon"></div> ZENITH OS</div>
        <nav>
            <div class="nav-link active"><span>💠 Dashboard</span></div>
            <div class="nav-link"><span>📊 Academics</span></div>
            <div class="nav-link"><span>📜 Archive</span></div>
            <div class="nav-link" onclick="togglePalette(true)"><span>⚙️ System</span></div>
        </nav>
        
        <div style="margin-top: auto; background: var(--glass-bright); padding: 1.5rem; border-radius: 20px;">
            <p style="font-size: 0.7rem; color: var(--text-dim); margin-bottom: 5px;">CURRENT GPA</p>
            <h2 id="gpa-display" style="color: var(--accent)">3.92</h2>
        </div>
    </aside>

    <main>
        <header>
            <div>
                <h1 id="user-greeting" style="font-size: 2.2rem; font-weight: 800; letter-spacing: -1px;">Systems Ready.</h1>
                <p id="live-clock" style="color: var(--text-dim); font-weight: 500;"></p>
            </div>
            <div class="search-trigger" onclick="togglePalette(true)">Press 'S' for System Settings...</div>
        </header>

        <div class="zenith-grid">
            <section class="widget w-large">
                <div style="display: flex; justify-content: space-between; margin-bottom: 2rem;">
                    <h3>Cognitive Load Analytics</h3>
                    <div style="font-size: 0.8rem; color: var(--accent)">● Live Tracking</div>
                </div>
                <canvas id="zenithChart" height="150"></canvas>
            </section>

            <section class="widget w-medium">
                <h3>Focus Engine</h3>
                <div class="timer-val" id="timer">25:00</div>
                <div style="display: flex; gap: 10px;">
                    <button class="btn" onclick="startFocus()">Initialize</button>
                    <button class="btn" style="background: var(--glass-bright); color: white;" onclick="resetFocus()">Reset</button>
                </div>
            </section>

            <section class="widget w-medium">
                <h3>Priority Queue</h3>
                <div id="taskQueue" style="margin-top: 1.5rem;">
                    </div>
                <button class="btn" style="width: 100%; margin-top: 1rem; background: var(--glass-bright); color: white;" onclick="addTask()">+ New Command</button>
            </section>

            <section class="widget w-small">
                <p style="color: var(--text-dim); font-size: 0.8rem;">TERM PROGRESS</p>
                <h2 style="margin: 10px 0;">68%</h2>
                <div style="height: 4px; background: #222; border-radius: 10px; overflow: hidden;">
                    <div style="width: 68%; height: 100%; background: var(--accent);"></div>
                </div>
            </section>
        </div>
    </main>

    <div id="commander">
        <div class="palette-card">
            <h2 style="margin-bottom: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem;">System Configuration</h2>
            
            <div style="display: flex; flex-direction: column; gap: 1.5rem;">
                <div>
                    <label style="display: block; font-size: 0.7rem; color: var(--text-dim); margin-bottom: 8px;">USER_IDENTITY</label>
                    <input type="text" id="username-in" style="width: 100%; background: #000; border: 1px solid var(--border); padding: 12px; color: white; border-radius: 10px;">
                </div>
                <div>
                    <label style="display: block; font-size: 0.7rem; color: var(--text-dim); margin-bottom: 8px;">SYSTEM_ACCENT_HEX</label>
                    <input type="color" id="accent-in" style="width: 100%; height: 50px; background: none; border: none; cursor: pointer;">
                </div>
                <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                    <button class="btn" style="flex: 1" onclick="saveSystem()">Save & Rebuild</button>
                    <button class="btn" style="flex: 1; background: #ef4444;" onclick="togglePalette(false)">Exit</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- SYSTEM ENGINE ---
        const Zenith = {
            state: JSON.parse(localStorage.getItem('zenith_state')) || {
                user: "Student_01",
                accent: "#00f2ff",
                tasks: ["Optimize Learning Flow", "Review Neural Architectures"]
            },

            init() {
                this.applyState();
                this.renderTasks();
                this.startClock();
                this.initChart();
                
                // Keyboard Listeners
                window.addEventListener('keydown', (e) => {
                    if(e.key.toLowerCase() === 's') togglePalette(true);
                    if(e.key === 'Escape') togglePalette(false);
                });
            },

            applyState() {
                document.getElementById('user-greeting').innerText = `Welcome, ${this.state.user}.`;
                document.getElementById('username-in').value = this.state.user;
                document.getElementById('accent-in').value = this.state.accent;
                document.documentElement.style.setProperty('--accent', this.state.accent);
                document.documentElement.style.setProperty('--accent-glow', this.state.accent + '44');
                localStorage.setItem('zenith_state', JSON.stringify(this.state));
            },

            startClock() {
                const update = () => {
                    const d = new Date();
                    document.getElementById('live-clock').innerText = d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'}) + " | " + d.toDateString();
                }
                setInterval(update, 1000); update();
            },

            renderTasks() {
                const root = document.getElementById('taskQueue');
                root.innerHTML = this.state.tasks.map((t, i) => `
                    <div class="task-row">
                        <div class="dot"></div>
                        <span style="font-size: 0.9rem;">${t}</span>
                    </div>
                `).join('');
            },

            initChart() {
                const ctx = document.getElementById('zenithChart').getContext('2d');
                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: ['00', '04', '08', '12', '16', '20', '24'],
                        datasets: [{
                            data: [20, 10, 45, 80, 60, 90, 70],
                            borderColor: this.state.accent,
                            tension: 0.5,
                            fill: true,
                            backgroundColor: 'rgba(0, 242, 255, 0.05)',
                            borderWidth: 3,
                            pointRadius: 0
                        }]
                    },
                    options: {
                        plugins: { legend: { display: false } },
                        scales: { x: { display: false }, y: { display: false } }
                    }
                });
            }
        };

        // --- CONTROLS ---
        function togglePalette(show) {
            document.getElementById('commander').style.display = show ? 'flex' : 'none';
        }

        function saveSystem() {
            Zenith.state.user = document.getElementById('username-in').value;
            Zenith.state.accent = document.getElementById('accent-in').value;
            Zenith.applyState();
            location.reload(); // Rebuild chart and styles
        }

        function addTask() {
            const task = prompt("Enter command for queue:");
            if(task) {
                Zenith.state.tasks.push(task);
                Zenith.renderTasks();
                localStorage.setItem('zenith_state', JSON.stringify(Zenith.state));
            }
        }

        // --- FOCUS ENGINE ---
        let timer;
        let timeLeft = 1500;
        function startFocus() {
            clearInterval(timer);
            timer = setInterval(() => {
                timeLeft--;
                let m = Math.floor(timeLeft / 60);
                let s = timeLeft % 60;
                document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
                if(timeLeft <= 0) clearInterval(timer);
            }, 1000);
        }
        function resetFocus() { timeLeft = 1500; document.getElementById('timer').innerText = "25:00"; clearInterval(timer); }

        Zenith.init();
    </script>
</body>
</html>
